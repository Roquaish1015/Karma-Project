    </main>
    <script>
      (function () {
        var menuBtn = document.getElementById("menuBtn");
        var navLinks = document.getElementById("mainNav");
        var artboard = document.querySelector(".artboard-wrap");
        var interactiveLinks = document.querySelectorAll("a[data-scroll-y], button[data-scroll-y]");
        var joinForm = document.getElementById("joinForm");

        var DESIGN_H = 10432;

        function scrollToDesignY(y) {
          var rect = artboard.getBoundingClientRect();
          var scrollTop =
            window.pageYOffset ||
            document.documentElement.scrollTop ||
            document.body.scrollTop ||
            0;
          var yPx = (Number(y) / DESIGN_H) * rect.height;
          var target = scrollTop + rect.top + yPx - 24;
          window.scrollTo({ top: Math.max(0, target), behavior: "smooth" });
        }

        function syncArtboardMetrics() {
          artboard.style.setProperty("--artboard-w", artboard.clientWidth + "px");
          artboard.style.setProperty("--artboard-h", artboard.offsetHeight + "px");
        }

        syncArtboardMetrics();
        window.addEventListener("resize", syncArtboardMetrics);
        if (window.ResizeObserver) {
          new ResizeObserver(syncArtboardMetrics).observe(artboard);
        }

        menuBtn.addEventListener("click", function () {
          var open = navLinks.classList.toggle("open");
          menuBtn.setAttribute("aria-expanded", String(open));
        });

        document.addEventListener("click", function (event) {
          if (!event.target.closest(".figma-nav")) {
            navLinks.classList.remove("open");
            menuBtn.setAttribute("aria-expanded", "false");
          }
        });

        interactiveLinks.forEach(function (link) {
          link.addEventListener("click", function (event) {
            var y = link.getAttribute("data-scroll-y");
            if (y === null || y === "") return;
            event.preventDefault();
            scrollToDesignY(y);
            navLinks.classList.remove("open");
            menuBtn.setAttribute("aria-expanded", "false");
          });
        });

        joinForm.addEventListener("submit", function (event) {
          event.preventDefault();
          alert("Thanks! Your details have been submitted.");
        });
      })();
    </script>
  </body>
</html>
